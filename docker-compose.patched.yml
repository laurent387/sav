version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: in-spectra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: in_spectra
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d in_spectra"]
      interval: 10s
      timeout: 5s
      retries: 5

  trpc:
    build:
      context: .
      dockerfile: docker/Dockerfile.trpc
    container_name: in-spectra-trpc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: in_spectra
      DATABASE_USER: api_user
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL:-false}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: in-spectra-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: in_spectra
      DATABASE_USER: api_user
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: postgres://api_user:${DATABASE_PASSWORD}@postgres:5432/in_spectra
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads
      - ./web-dist:/app/web-dist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: in-spectra-nginx
    restart: unless-stopped
    depends_on:
      - api
      - trpc
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/in-spectra-landing:/var/www/in-spectra-landing:ro
      - /var/www/in-spectra-app:/var/www/in-spectra-app:ro
      - /var/www/lift-gmao:/var/www/lift-gmao:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
